# Terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm*:RGB'
set -as terminal-overrides ',xterm*:Tc'
# undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
# Sixel graphics support
set -as terminal-features '*:sixel'
set -as terminal-features ',xterm*:extkeys'
set -as terminal-features ',foot*:extkeys'
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM


set -g word-separators " \"'()[]{}"
set -g pane-border-lines heavy
setw -g mode-keys vi
setw -g mouse on
set -g set-clipboard on

# For yazi file manager
set -g allow-passthrough on
set -s extended-keys on
if-shell 'test $XDG_SESSION_TYPE = x11' 'set -s copy-command xclip -i --selection clipboard'
if-shell 'test $XDG_SESSION_TYPE = wayland' 'set -s copy-command wl-copy'
if-shell 'uname | command grep -q Darwin' 'set -s copy-command pbcopy'

set -g detach-on-destroy off
# Focus events will trigger autoread inside vim
set -g focus-events on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g xterm-keys on

# set -g default-command /bin/fish
# set -g default-shell /bin/fish

unbind C-a
unbind C-b
unbind %
unbind M-l

set-option -g prefix C-s
unbind M-S-p
bind C-s send-prefix
bind -T prefix C-s send-keys C-s

unbind-key -T copy-mode-vi v
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle \; send -X begin-selection
bind -T copy-mode-vi r send -X rectangle-toggle \; send -X begin-selection
bind -T copy-mode-vi i   send -X cancel
bind -T copy-mode-vi escape   send -X cancel
# bind -T copy-mode-vi Y send-keys -X copy-line
# bind -T copy-mode-vi Y send -X copy-line-to-cursor-end-of-line \; send -X copy-pipe-and-cancel
# bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind   -T copy-mode-vi y              send -X copy-selection
bind   -T copy-mode-vi d              send -X copy-pipe-and-cancel
# bind   -T copy-mode-vi C-S-B          send -X copy-pipe-and-cancel \; paste-buffer
bind   -T copy-mode-vi Y          send -X copy-pipe-and-cancel \; paste-buffer

unbind -T copy-mode-vi MouseDragEnd1Pane

# use vim-like keys for splits and windows
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-o last-window
bind -n M-S-O swap-window -s 2 -t 1

# session management
bind -n M-w choose-session
bind -n M-S-W choose-tree
bind -n M-S-R command-prompt -I "#S" { rename-session "%%" }
bind -n M-S-T command-prompt -p "New Session:" { new-session -A -s '%%' }
bind -n M-escape copy-mode
bind -n -r M-z resize-pane -Z

# Easy config reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-g choose-window
bind -n M-S-C kill-pane
bind -n M-S-X kill-window

# move windows forward and backwards
# the reason why they don't work is because of opening yazi within tmux causes tab switch
# bind -n M-S-\{ swap-window -t -1 \; select-window -t :-
# bind -n M-S-\} swap-window -t +1 \; select-window -t :+
# bind -n M-\[ select-window -t :-
# bind -n M-\] select-window -t :+
bind -n M-\, select-window -t :-
bind -n M-\. select-window -t :+
bind -n M-S-< swap-window -t -1 \; select-window -t :-
bind -n M-S-> swap-window -t +1 \; select-window -t :+

# Select Pane & Persist Zoom
bind -n M-h if -F '#{window_zoomed_flag}' {
   select-pane -L
   resize-pane -Z
} {
   select-pane -L
}
bind -n M-j if -F '#{window_zoomed_flag}' {
   select-pane -D
   resize-pane -Z
} {
   select-pane -D
}
bind -n M-k if -F '#{window_zoomed_flag}' {
   select-pane -U
   resize-pane -Z
} {
   select-pane -U
}
bind -n M-l if -F '#{window_zoomed_flag}' {
   select-pane -R
   resize-pane -Z
} {
   select-pane -R
}
# Pane resizing
bind -n -r M-S-H resize-pane -L 2
bind -n -r M-S-J resize-pane -D 2
bind -n -r M-S-K resize-pane -U 2
bind -n -r M-S-L resize-pane -R 2

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8

# On Linux (Wayland) – optional check for wl-copy availability
if-shell 'test $XDG_SESSION_TYPE = wayland' 'setenv -g TMUX_URL_SELECT_CLIP_CMD wl-copy'

## on macos
if-shell 'uname | command grep -q Darwin' 'setenv -g TMUX_URL_SELECT_TMUX_CMD open'
if-shell 'uname | command grep -q Darwin' 'setenv -g  TMUX_URL_SELECT_CLIP_CMD pbcopy'

bind -n M-U run tmux-url-select

if "test ! -e ~/.local/bin/tmux-url-select" \
   "run 'wget -O ~/.local/bin/tmux-url-select https://github.com/dequis/tmux-url-select/raw/refs/heads/master/tmux-url-select.pl && chmod 744 ~/.local/bin/tmux-url-select'"

###### STATUSLINE ######
# Statusline Options
set-option -g status-position top

# vague.nvim theme colors
vague_bg="#141415"
vague_inactive_bg="#1c1c24"
vague_fg="#cdcdcd"
vague_float_border="#878787"
vague_line="#252530"
vague_comment="#606079"
vague_builtin="#b4d4cf"
vague_property="#c3c3d5"
vague_visual="#333738"
vague_error="#d8647e"
vague_hint="#7e98e8"
vague_operator="#90a0b5"
vague_delta="#f3be7c"

set -g status "on"
set -g status-style "fg=${vague_fg},bg=${vague_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${vague_delta},bg=${vague_line},align=centre"
set -g message-command-style "fg=${vague_delta},bg=${vague_line},align=centre"

# Panes
set -g pane-border-style "fg=${vague_float_border}"
set -g pane-active-border-style "fg=${vague_operator}"

# Windows
set -g window-status-activity-style "fg=${vague_delta},bg=${vague_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${vague_fg},bg=${vague_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${vague_operator},bg=${vague_bg},bold] #I: #[fg=${vague_property},bg=${vague_bg},bold]#{b:pane_current_path}#[fg=${vague_delta},bg=${vague_bg},bold]#{?window_zoomed_flag, [Z],}#[fg=${vague_fg},bg=${vague_bg},nobold,nounderscore,noitalics]"

# Statusline - other windows
set -g window-status-format "#[fg=${vague_comment},bg=${vague_bg}] #I: #[fg=${vague_fg},bg=${vague_bg}]#{b:pane_current_path}#[fg=${vague_comment},bg=${vague_bg}]#{?window_zoomed_flag, [Z],}#[fg=${vague_fg},bg=${vague_bg},nobold,nounderscore,noitalics]"

# Statusline - right side
set -g status-right "#[fg=${vague_operator},bg=${vague_bg},nobold,nounderscore,noitalics]#[fg=${vague_bg},bg=${vague_operator},nobold,nounderscore,noitalics] #[fg=${vague_property},bg=${vague_line}] #W #{?client_prefix,#[fg=${vague_delta}],#[fg=${vague_builtin}]}#[bg=${vague_line}]#{?client_prefix,#[bg=${vague_delta}],#[bg=${vague_builtin}]}#[fg=${vague_bg}] #[fg=${vague_property},bg=${vague_line}] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "${vague_operator}"
set -g mode-style "fg=${vague_delta},bg=${vague_visual},bold"
