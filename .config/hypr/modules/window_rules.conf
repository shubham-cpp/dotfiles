# vim:filetype=hyprlang
windowrule = no_anim off, match:class ^(.*)$
windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on,match:xwayland true, match:title (^$) ,float 1,fullscreen 0,pin 0
windowrule = opacity 0.0 override,match:class ^(xwaylandvideobridge)$
windowrule = no_anim on,match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on,match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1,match:class ^(xwaylandvideobridge)$
windowrule = no_blur on,match:class ^(xwaylandvideobridge)$

windowrule = workspace 2, match:class ^([Ff]irefox)|helium|(floorp|[Nn]avigator)|(zen-alpha)$
windowrule = workspace 2, match:class ^([Ff]irefox|[Ll]ibre[Ww]olf|floorp|Navigator)$
windowrule = workspace 2, match:class ^(([Bb]rave|[Tt]horium|[Cc]hromium)(-browser)?)$
windowrule = workspace 2, match:class ^io.github.ungoogled_software.ungoogled_chromium$
windowrule = float 1, match:class ^(Arandr|Arcologout.py|albert|feh|qalculate-gtk|[Gg]alculator|[Gg]nome-calculator|[Pp]avucontrol|org.gnome.Calculator)$
windowrule = float 1, match:title ^(All Files)$
windowrule = center 1, match:title ^(All Files)$
windowrule = float 1, match:title (Extension:.+Bitwarden.+)
windowrule = center 1, match:title (Extension:.+Bitwarden.+)
windowrule = size 50% 50%, match:class (Extension:.+Bitwarden.+)
windowrule = float 1, match:class ^(org.pulseaudio.pavucontrol|xdg-desktop-portal-gtk|zenity)
windowrule = center 1, match:class ^(org.pulseaudio.pavucontrol|xdg-desktop-portal-gtk|zenity)
windowrule = size 50% 50%, match:class ^(org.pulseaudio.pavucontrol|xdg-desktop-portal-gtk)
windowrule = float 1, match:title ^(.*)(Bitwarden)(.*)$
windowrule = center 1, match:title ^(.*)(Bitwarden)(.*)$
windowrule = size 50% 50%, match:title ^(.*)(Bitwarden)(.*)$
windowrule = float 1, match:class ^(thunar)$,match:title ^(Rename)(.*)
windowrule = center 1, match:class ^(thunar)$,match:title ^(Rename)(.*)
windowrule = size 25% 10%, match:class ^(thunar)$,match:title ^(Rename)(.*)
windowrule = float 1, match:class ^(floorp)$, match:title (.*)(— Sharing Indicator)

windowrule = float 1,match:class ^(org.kde.dolphin)$,match:title ^(Progress Dialog — Dolphin)$
windowrule = float 1,match:class ^(org.kde.dolphin)$,match:title ^(Copying — Dolphin)$
windowrule = float 1,match:title ^(About Mozilla Firefox)$
windowrule = float 1,match:class ^(firefox)$,match:title ^(Picture-in-Picture)$
windowrule = float 1,match:class ^(firefox)$,match:title ^(Library)$
windowrule = float 1,match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float 1,match:class ^(blueman-manager)$
windowrule = float 1,match:class ^(nm-applet)$
windowrule = float 1,match:class ^(nm-connection-editor|should_be_floating)$
windowrule = float 1,match:class ^(org.kde.polkit-kde-authentication-agent-1)$

windowrule = center 1, match:title ^(Open File)(.*)$
windowrule = center 1, match:title ^(Select a File)(.*)$
windowrule = center 1, match:title ^(Choose wallpaper)(.*)$
windowrule = center 1, match:title ^(Open Folder)(.*)$
windowrule = center 1, match:title ^(Save As)(.*)$
windowrule = center 1, match:title ^(Library)(.*)$
windowrule = center 1, match:title ^(clipboard-cliphist)|(File Upload)(.*)$
windowrule = center 1, match:class ^(should_be_floating)$

# layerrule = ignore_alpha 0.5, swaync-control-center
# layerrule = ignore_alpha 0.5, swaync-notification-window
# layerrule = blur on, swaync-control-center
# layerrule = blur on, swaync-notification-window
# layerrule = ignore_alpha 0.5, gtk-layer-shell
# layerrule = blur on, gtk-layer-shell

# Dialogs
windowrule = float 1,match:title ^(Open File)(.*)$
windowrule = float 1,match:title ^(Select a File)(.*)$
windowrule = float 1,match:title ^(Choose wallpaper)(.*)$
windowrule = float 1,match:title ^(Open Folder)(.*)$
windowrule = float 1,match:title ^(Save As)(.*)$
windowrule = float 1,match:title ^(Library)(.*)$
windowrule = float 1,match:title ^(clipboard-cliphist)|(File Upload)|(File Operation Progress)(.*)$
windowrule = size 80% 65%, match:title ^(clipboard-cliphist)
windowrule = size 80% 65%, match:class ^(should_be_floating)

# Tearing
# windowrule=immediate,.*\.exe
windowrule=immediate on,match:class steam_app

# No shadow for tiled windows
windowrule = no_shadow on,float 0

# To replicate “smart gaps” / “no gaps when only” from other WMs/Compositors,
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, float 0, match:workspace w[tv1]
windowrule = rounding 0, float 0, match:workspace w[tv1]
windowrule = border_size 0, float 0, match:workspace f[1]
windowrule = rounding 0, float 0, match:workspace f[1]
